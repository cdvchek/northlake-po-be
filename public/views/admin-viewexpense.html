<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ExpenseNote - Admin</title>
    <link rel="stylesheet" type="text/css" href="../css/adjustheight.css">
    <link rel="stylesheet" type="text/css" href="../css/receiptphotofullscreen.css">
    <link rel="stylesheet" type="text/css" href="../css/admin-viewexpense.css">
    <link rel="stylesheet" type="text/css" href="../css/navbar.css">
</head>
<body>
    <div id="content">
        <div id="buttons-space">
            <button id="back-btn" class="top-btn">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="size-6">
                    <path stroke-linecap="round" stroke-linejoin="round" d="m11.25 9-3 3m0 0 3 3m-3-3h7.5M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z" />
                </svg>                  
            </button>
            <button id="save-btn" class="top-btn">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="size-6">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M12 9.75v6.75m0 0-3-3m3 3 3-3m-8.25 6a4.5 4.5 0 0 1-1.41-8.775 5.25 5.25 0 0 1 10.233-2.33 3 3 0 0 1 3.758 3.848A3.752 3.752 0 0 1 18 19.5H6.75Z" />
                </svg>                  
            </button>
            <button id="edit-btn" class="top-btn">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="size-6">
                    <path stroke-linecap="round" stroke-linejoin="round" d="m16.862 4.487 1.687-1.688a1.875 1.875 0 1 1 2.652 2.652L10.582 16.07a4.5 4.5 0 0 1-1.897 1.13L6 18l.8-2.685a4.5 4.5 0 0 1 1.13-1.897l8.932-8.931Zm0 0L19.5 7.125M18 14v4.75A2.25 2.25 0 0 1 15.75 21H5.25A2.25 2.25 0 0 1 3 18.75V8.25A2.25 2.25 0 0 1 5.25 6H10" />
                </svg>                  
            </button>
        </div>
        <div id="expense-space">
            <div class="expense-section-title-space">
                <h1 class="expense-section-title">Expense Details</h1>
            </div>
            <div id="expense-details">
                <div id="expense-details-left" class="expense-detail-column">
                    <div class="expense-detail">
                        <p id="entry-number-title" class="expense-title">Entry:</p>
                        <p id="entry-number" class="expense-text"></p>
                    </div>
                    <div class="expense-detail">
                        <p id="submitter-title" class="expense-title">Submitter:</p>
                        <p id="submitter" class="expense-text"></p>
                    </div>
                    <div class="expense-detail">
                        <p id="vendor-payee-title" class="expense-title"></p>
                        <p id="vendor-payee" class="expense-text"></p>
                    </div>
                </div>
                <div id="expense-details-right" class="expense-detail-column">
                    <div class="expense-detail">
                        <p id="purchase-date-title" class="expense-title">Date:</p>
                        <p id="purchase-date" class="expense-text"></p>
                    </div>
                    <div class="expense-detail">
                        <p id="payment-type-title" class="expense-title">Payment:</p>
                        <p id="payment-type" class="expense-text"></p>
                    </div>
                    <div id="address-ccholder-div" class="expense-detail">
                        <p id="address-ccholder-title" class="expense-title"></p>
                        <p id="address-ccholder" class="expense-text"></p>
                    </div>
                </div>
            </div>
            <div class="expense-section-title-space">
                <h1 class="expense-section-title">Budget Splits</h1>
            </div>
            <div id="budget-splits-details">
                <div id="budget-splits-details-header" class="budget-split-detail">
                    <p class="bsd-1">Line #</p>
                    <p class="bsd-2">Description</p>
                    <p class="bsd-3">Subprice</p>
                </div>
            </div>
            <div id="expense-total">
                <p id="purchase-total-title" class="expense-title">Total Price:</p>
                <p id="purchase-total" class="expense-text"></p>
            </div>
            <div id="receipt-photos"></div>
            <div id="photo-fullscreen-div" style="display: none;">
                <button id="close-fullscreen">X</button>
                <img id="photo-fullscreen"  alt="fullscreen of selected photo">
            </div>
            <div id="delete-btn-div">
                <button id="delete-btn">Delete</button>
            </div>
        </div>
        <div id="navbar-space">
            <nav id="navbar">
                <div id="navbar-content">
                    <div id="expenses-btn-wrapper" class="navbar-adminsubspace">
                        <button id="expenses-btn" class="navbar-btn">
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="size-6 icon-nav">
                                <path fill-rule="evenodd" d="M7.502 6h7.128A3.375 3.375 0 0 1 18 9.375v9.375a3 3 0 0 0 3-3V6.108c0-1.505-1.125-2.811-2.664-2.94a48.972 48.972 0 0 0-.673-.05A3 3 0 0 0 15 1.5h-1.5a3 3 0 0 0-2.663 1.618c-.225.015-.45.032-.673.05C8.662 3.295 7.554 4.542 7.502 6ZM13.5 3A1.5 1.5 0 0 0 12 4.5h4.5A1.5 1.5 0 0 0 15 3h-1.5Z" clip-rule="evenodd" />
                                <path fill-rule="evenodd" d="M3 9.375C3 8.339 3.84 7.5 4.875 7.5h9.75c1.036 0 1.875.84 1.875 1.875v11.25c0 1.035-.84 1.875-1.875 1.875h-9.75A1.875 1.875 0 0 1 3 20.625V9.375ZM6 12a.75.75 0 0 1 .75-.75h.008a.75.75 0 0 1 .75.75v.008a.75.75 0 0 1-.75.75H6.75a.75.75 0 0 1-.75-.75V12Zm2.25 0a.75.75 0 0 1 .75-.75h3.75a.75.75 0 0 1 0 1.5H9a.75.75 0 0 1-.75-.75ZM6 15a.75.75 0 0 1 .75-.75h.008a.75.75 0 0 1 .75.75v.008a.75.75 0 0 1-.75.75H6.75a.75.75 0 0 1-.75-.75V15Zm2.25 0a.75.75 0 0 1 .75-.75h3.75a.75.75 0 0 1 0 1.5H9a.75.75 0 0 1-.75-.75ZM6 18a.75.75 0 0 1 .75-.75h.008a.75.75 0 0 1 .75.75v.008a.75.75 0 0 1-.75.75H6.75a.75.75 0 0 1-.75-.75V18Zm2.25 0a.75.75 0 0 1 .75-.75h3.75a.75.75 0 0 1 0 1.5H9a.75.75 0 0 1-.75-.75Z" clip-rule="evenodd" />
                            </svg>
                        </button>
                    </div>
                    <div id="expensenumbers-btn-wrapper" class="navbar-adminsubspace">
                        <button id="expensenumbers-btn" class="navbar-btn">
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="size-6 icon-nav">
                                <path fill-rule="evenodd" d="M5.25 2.25a3 3 0 0 0-3 3v4.318a3 3 0 0 0 .879 2.121l9.58 9.581c.92.92 2.39 1.186 3.548.428a18.849 18.849 0 0 0 5.441-5.44c.758-1.16.492-2.629-.428-3.548l-9.58-9.581a3 3 0 0 0-2.122-.879H5.25ZM6.375 7.5a1.125 1.125 0 1 0 0-2.25 1.125 1.125 0 0 0 0 2.25Z" clip-rule="evenodd" />
                            </svg>  
                        </button>
                    </div>
                    <div id="countdown-wrapper" class="navbar-subspace">
                        <div id="countdown">
                            <p id="countdown-text"></p>
                        </div>
                    </div>
                    <div id="users-btn-wrapper" class="navbar-adminsubspace">
                        <button id="users-btn" class="navbar-btn">
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="size-6 icon-nav">
                                <path d="M4.5 6.375a4.125 4.125 0 1 1 8.25 0 4.125 4.125 0 0 1-8.25 0ZM14.25 8.625a3.375 3.375 0 1 1 6.75 0 3.375 3.375 0 0 1-6.75 0ZM1.5 19.125a7.125 7.125 0 0 1 14.25 0v.003l-.001.119a.75.75 0 0 1-.363.63 13.067 13.067 0 0 1-6.761 1.873c-2.472 0-4.786-.684-6.76-1.873a.75.75 0 0 1-.364-.63l-.001-.122ZM17.25 19.128l-.001.144a2.25 2.25 0 0 1-.233.96 10.088 10.088 0 0 0 5.06-1.01.75.75 0 0 0 .42-.643 4.875 4.875 0 0 0-6.957-4.611 8.586 8.586 0 0 1 1.71 5.157v.003Z" />
                            </svg>                              
                        </button>
                    </div>
                    <div id="backtouser-btn-wrapper" class="navbar-adminsubspace">
                        <button id="backtouser-btn" class="navbar-btn">
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="size-6 icon-nav">
                                <path fill-rule="evenodd" d="M12.97 3.97a.75.75 0 0 1 1.06 0l7.5 7.5a.75.75 0 0 1 0 1.06l-7.5 7.5a.75.75 0 1 1-1.06-1.06l6.22-6.22H3a.75.75 0 0 1 0-1.5h16.19l-6.22-6.22a.75.75 0 0 1 0-1.06Z" clip-rule="evenodd" />
                            </svg>
                        </button>
                    </div>
                </div>
            </nav>
        </div>
        <script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
        <script src="../js/adjustview.js"></script>
        <script src="../js/receiptphotofullscreen.js"></script>
        <script src="../js/a_viewexpense-backbutton.js"></script>
        <script src="../js/a_viewexpense-editbutton.js"></script>
        <script src="../js/a_viewexpense-deletebutton.js"></script>
        <script src="../js/a_viewexpense-fetchexpensenumber.js"></script>
        <script src="../js/a_viewexpense-saveexpense.js"></script>
        <script src="../js/navbar-countdown.js"></script>
        <script src="../js/navbar-navigation.js"></script>
        <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
        <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
    </div>
</body>
</html>
